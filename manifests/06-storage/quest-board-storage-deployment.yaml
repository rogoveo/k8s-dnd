apiVersion: apps/v1
kind: Deployment
metadata:
  name: quest-board
  namespace: adventure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quest-board
  template:
    metadata:
      labels:
        app: quest-board
    spec:
      containers:
        - name: quest-board
          image: python:3.12-alpine
          command:
            - python
            - -c
            - |
              import os
              from pathlib import Path
              from http.server import BaseHTTPRequestHandler, HTTPServer
              data_dir = Path("/data")
              notes_file = data_dir / "party.log"
              class Handler(BaseHTTPRequestHandler):
                  def do_GET(self):
                      notes = notes_file.read_text(encoding="utf-8") if notes_file.exists() else "no notes yet"
                      kingdom = os.getenv("KINGDOM_NAME", "unknown")
                      body = f"<h1>{kingdom}</h1><pre>{notes}</pre>"
                      self.send_response(200)
                      self.send_header("Content-Type", "text/html; charset=utf-8")
                      self.end_headers()
                      self.wfile.write(body.encode("utf-8"))
                  def log_message(self, format, *args):
                      return
              data_dir.mkdir(parents=True, exist_ok=True)
              HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: quest-board-config
            - secretRef:
                name: quest-board-secret
          volumeMounts:
            - name: notes
              mountPath: /data
      volumes:
        - name: notes
          persistentVolumeClaim:
            claimName: quest-board-data
