apiVersion: apps/v1
kind: Deployment
metadata:
  name: quest-board
  namespace: adventure
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quest-board
  template:
    metadata:
      labels:
        app: quest-board
    spec:
      containers:
        - name: quest-board
          image: python:3.12-alpine
          command:
            - python
            - -c
            - |
              import os
              from http.server import BaseHTTPRequestHandler, HTTPServer
              class Handler(BaseHTTPRequestHandler):
                  def do_GET(self):
                      kingdom = os.getenv("KINGDOM_NAME", "unknown")
                      quest = os.getenv("QUEST_NAME", "unknown")
                      token = "loaded" if os.getenv("DRAGON_TOKEN") else "missing"
                      body = f"<h1>{kingdom}</h1><p>{quest}</p><p>token: {token}</p>"
                      self.send_response(200)
                      self.send_header("Content-Type", "text/html; charset=utf-8")
                      self.end_headers()
                      self.wfile.write(body.encode("utf-8"))
                  def log_message(self, format, *args):
                      return
              HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: quest-board-config
            - secretRef:
                name: quest-board-secret
          volumeMounts:
            - name: notes
              mountPath: /data
      volumes:
        - name: notes
          emptyDir: {}
